<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>images maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg-color: #2c2c2c;
            --control-bg: #333333;
            --btn-dark: #444;
            --btn-blue: #009ce2;
            --btn-red: #ff4444;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        .ui-wrapper { width: 100%; max-width: 500px; padding: 15px; }
        h1 { margin: 0 0 15px 0; font-size: 28px; font-weight: bold; align-self: flex-start; }

        button { width: 100%; border: none; border-radius: 4px; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 12px; }
        .btn-upload { background: var(--btn-dark); color: #fff; }
        .btn-add { background: var(--btn-blue); color: white; margin-bottom: 15px; text-transform: none; }
        .btn-save { background: var(--btn-dark); color: white; margin-top: 15px; }
        .btn-done { background: #32CD32; color: black; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; padding: 25px; }

        .text-block { margin-bottom: 15px; }
        .input-row { display: flex; border-radius: 6px; overflow: hidden; margin-bottom: 5px; }
        .input-row input[type="text"] { flex-grow: 1; padding: 12px; border: none; font-size: 18px; color: #666; font-weight: bold; outline: none; }
        .btn-del { background: var(--btn-red); color: white; width: 55px; font-size: 22px; margin-bottom: 0; border-radius: 0; }
        
        .sro-row { display: flex; gap: 10px; font-size: 10px; color: #999; padding: 0 5px; align-items: center; }
        .sro-row label { display: flex; align-items: center; gap: 4px; flex: 1; }
        .sro-row input { flex: 1; accent-color: var(--btn-blue); height: 3px; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--control-bg); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .control-item label { font-size: 12px; text-transform: uppercase; color: #ccc; }
        .control-item input[type="range"] { accent-color: var(--btn-blue); width: 100%; }
        
        .swatch-box { width: 60px; height: 30px; background: black; border: 3px solid white; position: relative; }
        input[type="color"] { opacity: 0; width: 100%; height: 100%; cursor: pointer; position: absolute; top:0; left:0; }

        .canvas-container { width: 100%; background: var(--control-bg); padding: 10px; border-radius: 4px; margin-top: 10px; }
        canvas { width: 100%; background: #000; display: block; touch-action: none; }
        canvas.active-drag { outline: 3px solid #32CD32; }

        #cropWrap { width: 100%; display: none; background: #000; margin-bottom: 10px; padding: 10px; }
        
        @font-face {
            font-family: 'ImpactCustom';
            src: url('impact.ttf');
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="ui-wrapper">
    <h1>images maker</h1>
    
    <button class="btn-upload" onclick="document.getElementById('gallery').click()">UPLOAD</button>
    <input type="file" id="gallery" accept="image/*" style="display:none">

    <div id="cropWrap"><img id="cropImg" style="max-width: 100%;"></div>
    <button id="applyBtn" class="btn-add" onclick="applyCrop()" style="display:none; background:#2ecc71;">CONFIRM CROP</button>

    <div id="textInputs"></div>
    <button class="btn-add" onclick="addText()">+ ADD TEXT</button>

    <div class="settings-grid">
        <div class="control-item"><label>QUALITY</label><input type="range" id="quality" min="5" max="100" value="100" oninput="render()"></div>
        <div class="control-item"><label>NOISE</label><input type="range" id="noise" min="0" max="100" value="0" onchange="processBaseAndRender()"></div>
        <div class="control-item"><label>CONTRAST</label><input type="range" id="con" min="50" max="250" value="100" onchange="processBaseAndRender()"></div>
        <div class="control-item"><label>SATURATION</label><input type="range" id="sat" min="0" max="300" value="100" onchange="processBaseAndRender()"></div>
        <div class="control-item"><label>WIDTH</label><input type="range" id="wGlobal" min="0.1" max="3" step="0.1" value="1" oninput="updateGlobalWidth()"></div>
        <div class="control-item"><label>STROKE</label><input type="range" id="s" min="0" max="20" value="5" oninput="render()"></div>
        <div class="control-item"><label>STROKE COLOR</label><div class="swatch-box" id="cDisp"><input type="color" id="sCol" value="#000000" oninput="document.getElementById('cDisp').style.background=this.value; render()"></div></div>
        <div class="control-item"><label>SHADOW MODE</label><input type="checkbox" id="shd" onchange="render()" style="width:25px; height:25px;"></div>
    </div>

    <div class="canvas-container"><canvas id="memeCanvas"></canvas></div>
    <button class="btn-save" onclick="download()">SAVE</button>
</div>

<button id="doneBtn" class="btn-done" onclick="finishMove()">✓ DONE EDITING</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('memeCanvas');
    const ctx = canvas.getContext('2d');
    const off = document.createElement('canvas'), proc = document.createElement('canvas');
    const pctx = proc.getContext('2d');
    
    let cropper, baseImg = null, texts = [], activeDragIdx = null, holdTimer = null, isDraggingEnabled = false, dragMode = null;
    let startPointerX, startPointerY, startTextX, startTextY, startScaleW, startScaleH, startHandleDist;

    function refreshInputs() {
        const container = document.getElementById('textInputs'); container.innerHTML = '';
        texts.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'text-block';
            div.innerHTML = `
                <div class="input-row">
                    <input type="text" placeholder="Blank" value="${t.content}" oninput="texts[${i}].content=this.value; render()">
                    <button class="btn-del" onclick="removeText(${i})">X</button>
                </div>
                <div class="sro-row">
                    <label>S <input type="range" min="0.1" max="5" step="0.1" value="${t.size}" oninput="texts[${i}].size=parseFloat(this.value); render()"></label>
                    <label>R <input type="range" min="-180" max="180" value="${t.rot}" oninput="texts[${i}].rot=this.value; render()"></label>
                    <label>O <input type="range" min="0" max="1" step="0.1" value="${t.alpha}" oninput="texts[${i}].alpha=this.value; render()"></label>
                </div>`;
            container.appendChild(div);
        });
    }

    function addText() { 
        texts.push({ content: "Blank", x: 0.5, y: 0.5, size: 1, scaleW: 1, scaleH: 1, rot: 0, alpha: 1 }); 
        refreshInputs(); render(); 
    }
    function removeText(i) { texts.splice(i, 1); refreshInputs(); render(); }
    function updateGlobalWidth() { const val = document.getElementById('wGlobal').value; texts.forEach(t => t.scaleW = val); render(); }

    document.getElementById('gallery').onchange = (e) => {
        const file = e.target.files[0], reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('cropWrap').style.display = 'block'; document.getElementById('applyBtn').style.display = 'block';
            const el = document.getElementById('cropImg'); el.src = ev.target.result;
            if(cropper) cropper.destroy(); cropper = new Cropper(el, { viewMode: 1 });
        };
        reader.readAsDataURL(file);
    };

    function applyCrop() {
        baseImg = new Image();
        baseImg.onload = () => {
            canvas.width = off.width = proc.width = baseImg.width;
            canvas.height = off.height = proc.height = baseImg.height;
            off.getContext('2d').drawImage(baseImg, 0, 0);
            document.getElementById('cropWrap').style.display = 'none'; document.getElementById('applyBtn').style.display = 'none';
            processBaseAndRender();
        };
        baseImg.src = cropper.getCroppedCanvas().toDataURL();
    }

    function processBaseAndRender() {
        if(!baseImg) return;
        pctx.clearRect(0,0,proc.width,proc.height);
        pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
        pctx.drawImage(off, 0, 0);
        const noise = document.getElementById('noise').value;
        if(noise > 0) {
            const d = pctx.getImageData(0,0,proc.width,proc.height);
            for(let i=0; i<d.data.length; i+=4) { let r = (Math.random()-0.5)*noise; d.data[i]+=r; d.data[i+1]+=r; d.data[i+2]+=r; }
            pctx.putImageData(d,0,0);
        }
        render();
    }

    function render() {
        if(!baseImg) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        const q = document.getElementById('quality').value / 100;
        if (q < 1) {
            const sw = canvas.width * q, sh = canvas.height * q;
            const temp = document.createElement('canvas'); temp.width = sw; temp.height = sh;
            const tctx = temp.getContext('2d');
            tctx.drawImage(proc, 0, 0, sw, sh);
            ctx.imageSmoothingEnabled = false; 
            ctx.drawImage(temp, 0, 0, sw, sh, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.drawImage(proc, 0, 0);
        }
        
        texts.forEach((t, i) => drawText(t, ctx, i === activeDragIdx));
    }

    function drawText(t, target, active) {
        const fs = (canvas.width / 10) * t.size;
        target.save();
        target.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
        target.textAlign = 'center';
        target.globalAlpha = t.alpha;
        const txt = t.content || "Blank";
        const metrics = target.measureText(txt);
        t.width = metrics.width * t.scaleW; t.height = fs * t.scaleH;

        target.translate(canvas.width * t.x, canvas.height * t.y);
        target.rotate(t.rot * Math.PI / 180);
        
        if(active) {
            target.strokeStyle = '#32CD32'; target.lineWidth = 2;
            target.strokeRect(-t.width/2 - 10, -t.height/1.2, t.width + 20, t.height * 1.2);
            target.fillStyle = '#ff4436'; target.fillRect(t.width/2 + 5, -t.height/1.2 - 30, 40, 40); 
            target.fillStyle = '#3498db'; target.fillRect(t.width/2 + 10, -20, 30, 30); 
            target.fillStyle = '#2ecc71'; target.fillRect(-15, t.height/2 + 5, 30, 30); 
        }

        target.scale(t.scaleW, t.scaleH);
        if(document.getElementById('shd').checked) {
            target.shadowColor = document.getElementById('sCol').value; target.shadowBlur = document.getElementById('s').value;
        } else {
            target.strokeStyle = document.getElementById('sCol').value; target.lineWidth = document.getElementById('s').value;
            target.strokeText(txt, 0, 0);
        }
        target.fillStyle = 'white'; target.fillText(txt, 0, 0);
        target.restore();
    }

    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
        const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if (isDraggingEnabled && activeDragIdx !== null) {
            const t = texts[activeDragIdx];
            const cx = t.x * canvas.width, cy = t.y * canvas.height;
            const angle = -t.rot * Math.PI / 180;
            const lx = (ex - cx) * Math.cos(angle) - (ey - cy) * Math.sin(angle);
            const ly = (ex - cx) * Math.sin(angle) + (ey - cy) * Math.cos(angle);
            if (lx > t.width/2 && ly < -t.height/2) { dragMode = 'size'; startScaleW = t.scaleW; startHandleDist = Math.sqrt(lx*lx+ly*ly); canvas.setPointerCapture(e.pointerId); return; }
            if (lx > t.width/2) { dragMode = 'width'; startScaleW = t.scaleW; startHandleDist = lx; canvas.setPointerCapture(e.pointerId); return; }
            if (ly > t.height/2) { dragMode = 'height'; startScaleH = t.scaleH; startHandleDist = ly; canvas.setPointerCapture(e.pointerId); return; }
        }

        let found = null;
        texts.forEach((t, i) => {
            if(Math.abs(ex - t.x * canvas.width) < 80 && Math.abs(ey - t.y * canvas.height) < 40) found = i;
        });

        if(found !== null) {
            startPointerX = ex; startPointerY = ey; startTextX = texts[found].x; startTextY = texts[found].y;
            holdTimer = setTimeout(() => {
                activeDragIdx = found; isDraggingEnabled = true; dragMode = 'move';
                canvas.classList.add('active-drag'); document.getElementById('doneBtn').style.display = 'block';
                canvas.setPointerCapture(e.pointerId); render();
            }, 400);
        }
    });

    canvas.addEventListener('pointermove', (e) => {
        if(!isDraggingEnabled || activeDragIdx === null || !canvas.hasPointerCapture(e.pointerId)) return;
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
        const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
        const t = texts[activeDragIdx];

        if (dragMode === 'move') {
            t.x = startTextX + (ex - startPointerX) / canvas.width;
            t.y = startTextY + (ey - startPointerY) / canvas.height;
        } else {
            const cx = t.x * canvas.width, cy = t.y * canvas.height;
            const angle = -t.rot * Math.PI / 180;
            const lx = (ex - cx) * Math.cos(angle) - (ey - cy) * Math.sin(angle);
            const ly = (ex - cx) * Math.sin(angle) + (ey - cy) * Math.cos(angle);
            if (dragMode === 'size') { const r = Math.sqrt(lx*lx+ly*ly)/startHandleDist; t.scaleW *= r; t.scaleH *= r; startHandleDist = Math.sqrt(lx*lx+ly*ly); }
            if (dragMode === 'width') t.scaleW = Math.max(0.1, startScaleW * (lx / startHandleDist));
            if (dragMode === 'height') t.scaleH = Math.max(0.1, startScaleH * (ly / startHandleDist));
        }
        render();
    });

    canvas.addEventListener('pointerup', () => { clearTimeout(holdTimer); if(dragMode!=='move') dragMode = null; });

    function finishMove() {
        isDraggingEnabled = false; activeDragIdx = null; dragMode = null;
        canvas.classList.remove('active-drag'); document.getElementById('doneBtn').style.display = 'none'; render();
    }

    function download() {
        const q = document.getElementById('quality').value / 100;
        const link = document.createElement('a'); 
        link.download = 'image.jpg';
        link.href = canvas.toDataURL('image/jpeg', q); 
        link.click();
    }
</script>
</body>
</html>
