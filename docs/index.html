<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>images maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --bg-color: #2c2c2c; --control-bg: #333333; --btn-dark: #444; --btn-blue: #009ce2; --btn-red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .ui-wrapper { width: 100%; max-width: 500px; padding: 15px; }
        h1 { margin: 0 0 15px 0; font-size: 28px; font-weight: bold; align-self: flex-start; }
        button { width: 100%; border: none; border-radius: 4px; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 12px; }
        .btn-upload { background: var(--btn-dark); color: #fff; }
        .btn-add { background: var(--btn-blue); color: white; margin-bottom: 15px; text-transform: none; }
        .btn-save { background: var(--btn-dark); color: white; margin-top: 15px; border: 1px solid #666; }
        .btn-done { background: #32CD32; color: black; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; padding: 25px; }
        .text-block { margin-bottom: 20px; }
        .input-row { display: flex; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .input-row input[type="text"] { flex-grow: 1; padding: 12px; border: none; font-size: 18px; color: #666; font-weight: bold; outline: none; }
        .btn-del { background: var(--btn-red); color: white; width: 55px; font-size: 22px; border-radius: 0; margin-bottom: 0; }
        .sro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 5px; }
        .sro-grid label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #999; }
        .sro-grid input { flex: 1; accent-color: var(--btn-blue); height: 3px; cursor: pointer; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--control-bg); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .control-item label { font-size: 12px; text-transform: uppercase; color: #ccc; }
        .swatch-box { width: 60px; height: 30px; background: black; border: 3px solid white; position: relative; }
        input[type="color"] { opacity: 0; width: 100%; height: 100%; cursor: pointer; position: absolute; top:0; left:0; }
        .canvas-container { width: 100%; background: var(--control-bg); padding: 10px; border-radius: 4px; margin-top: 10px; }
        canvas { width: 100%; background: #000; display: block; touch-action: none; }
        canvas.active-drag { outline: 3px solid #32CD32; }
        #cropWrap { width: 100%; display: none; background: #000; margin-bottom: 10px; padding: 10px; }
        #cropImg { max-width: 100%; display: block; }
        @font-face { font-family: 'ImpactCustom'; src: url('impact.ttf'); font-weight: normal; }
    </style>
</head>
<body>

<div class="ui-wrapper">
    <h1>images maker</h1>
    <button class="btn-upload" onclick="document.getElementById('gallery').click()">UPLOAD</button>
    <input type="file" id="gallery" accept="image/*" style="display:none">
    
    <div id="cropWrap"><img id="cropImg"></div>
    <button id="applyBtn" class="btn-add" onclick="applyCrop()" style="display:none; background:#2ecc71;">CONFIRM CROP</button>

    <div id="textInputs"></div>
    <button class="btn-add" onclick="addText()">+ ADD TEXT</button>

    <div class="settings-grid">
        <div class="control-item"><label>QUALITY</label><input type="range" id="quality" min="1" max="100" value="95" oninput="queueQuality()"></div>
        <div class="control-item"><label>NOISE</label><input type="range" id="noise" min="0" max="100" value="0" onchange="processBase()"></div>
        <div class="control-item"><label>CONTRAST</label><input type="range" id="con" min="50" max="250" value="100" onchange="processBase()"></div>
        <div class="control-item"><label>SATURATION</label><input type="range" id="sat" min="0" max="300" value="100" onchange="processBase()"></div>
        <div class="control-item"><label>VIGNETTE</label><input type="range" id="vig" min="0" max="100" value="0" onchange="processBase()"></div>
        <div class="control-item"><label>RGB GLITCH</label><input type="range" id="gli" min="0" max="150" value="0" onchange="processBase()"></div>
        <div class="control-item"><label>STROKE</label><input type="range" id="s" min="0" max="20" value="5" oninput="requestRender()"></div>
        <div class="control-item"><label>STROKE COLOR</label><div class="swatch-box" id="cDisp"><input type="color" id="sCol" value="#000000" oninput="document.getElementById('cDisp').style.background=this.value; requestRender()"></div></div>
        <div class="control-item"><label>SHADOW MODE</label><input type="checkbox" id="shd" onchange="requestRender()" style="width:25px; height:25px;"></div>
    </div>
    <div class="canvas-container"><canvas id="memeCanvas"></canvas></div>
    <button class="btn-save" onclick="download()">SAVE</button>
</div>

<button id="doneBtn" class="btn-done" onclick="finishMove()">✓ DONE EDITING</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('memeCanvas'), ctx = canvas.getContext('2d', {alpha: false});
    const off = document.createElement('canvas'), proc = document.createElement('canvas'), pctx = proc.getContext('2d', {alpha: false});
    const qCache = document.createElement('canvas'), qctx = qCache.getContext('2d', {alpha: false});
    let cropper, baseImg = null, texts = [], activeDragIdx = null, dragMode = null, isUpdatingQ = false, needsQ = false, rafPending = false;
    let startX, startY, startTX, startTY, startSW, startSH, startDist;
    let activePointers = {};
    let startRot = 0, startAngle = 0;

    const HANDLE_SIZE = 30;
    const HITBOX_PADDING = 20;

    function refreshInputs() {
        const container = document.getElementById('textInputs'); container.innerHTML = '';
        texts.forEach((t, i) => {
            const div = document.createElement('div'); div.className = 'text-block';
            div.innerHTML = `<div class="input-row"><input type="text" value="${t.content}" oninput="texts[${i}].content=this.value; requestRender()"><button class="btn-del" onclick="removeText(${i})">X</button></div>
                <div class="sro-grid"><label>S <input type="range" min="0.1" max="5" step="0.1" value="${t.size}" oninput="texts[${i}].size=parseFloat(this.value); requestRender()"></label>
                <label>R <input type="range" min="-180" max="180" value="${t.rot}" oninput="texts[${i}].rot=this.value; requestRender()"></label>
                <label>O <input type="range" min="0" max="1" step="0.1" value="${t.alpha}" oninput="texts[${i}].alpha=this.value; requestRender()"></label></div>`;
            container.appendChild(div);
        });
    }

    function addText() { texts.push({content:"", x:0.5, y:0.5, size:1, scaleW:1, scaleH:1, rot:0, alpha:1, w:0, h:0}); refreshInputs(); requestRender(); }
    function removeText(i) { texts.splice(i,1); if(activeDragIdx===i) activeDragIdx=null; refreshInputs(); requestRender(); }

    document.getElementById('gallery').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const url = URL.createObjectURL(file); const el = document.getElementById('cropImg');
        document.getElementById('cropWrap').style.display = 'block'; document.getElementById('applyBtn').style.display = 'block';
        if(cropper) cropper.destroy();
        el.onload = () => { cropper = new Cropper(el, {viewMode:1, autoCropArea:1}); };
        el.src = url; e.target.value = '';
    };

    function applyCrop() {
        if(!cropper) return;
        const croppedCanvas = cropper.getCroppedCanvas();
        baseImg = new Image();
        baseImg.onload = () => {
            canvas.width = off.width = proc.width = qCache.width = baseImg.width;
            canvas.height = off.height = proc.height = qCache.height = baseImg.height;
            off.getContext('2d').drawImage(baseImg, 0, 0);
            document.getElementById('cropWrap').style.display = 'none'; document.getElementById('applyBtn').style.display = 'none';
            processBase();
        };
        baseImg.src = croppedCanvas.toDataURL('image/png');
        cropper.destroy(); cropper = null;
    }

    function processBase() {
        if(!baseImg) return;
        const w = proc.width, h = proc.height;
        pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
        pctx.drawImage(off, 0, 0);
        pctx.filter = 'none';
        const imageData = pctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        const nVal = parseInt(document.getElementById('noise').value);
        const gVal = parseInt(document.getElementById('gli').value);
        if (nVal > 0 || gVal > 0) {
            for (let i = 0; i < data.length; i += 4) {
                if (nVal > 0) { let r = (Math.random() - 0.5) * nVal; data[i]+=r; data[i+1]+=r; data[i+2]+=r; }
                if (gVal > 0) { data[i]+=(Math.random()-0.5)*gVal; data[i+1]+=(Math.random()-0.5)*gVal; data[i+2]+=(Math.random()-0.5)*gVal; }
            }
            pctx.putImageData(imageData, 0, 0);
        }
        const vVal = document.getElementById('vig').value;
        if(vVal > 0) {
            const grad = pctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.sqrt(w*w+h*h)/2);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, `rgba(0,0,0,${vVal/100})`);
            pctx.fillStyle = grad; pctx.fillRect(0,0,w,h);
        }
        queueQuality();
    }

    function queueQuality() { needsQ = true; if(!isUpdatingQ) updateQuality(); }
    function updateQuality() {
        if(!baseImg) return; isUpdatingQ = true; needsQ = false;
        const img = new Image();
        img.onload = () => { qctx.drawImage(img, 0, 0); requestRender(); isUpdatingQ = false; if(needsQ) updateQuality(); };
        img.src = proc.toDataURL('image/jpeg', document.getElementById('quality').value/100);
    }

    function requestRender() { if(!rafPending) { rafPending = true; requestAnimationFrame(render); } }

    function render() {
        rafPending = false; if(!baseImg) return;
        ctx.drawImage(qCache, 0, 0);
        texts.forEach((t, i) => {
            const fs = (canvas.width/10)*t.size;
            ctx.save(); ctx.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const m = ctx.measureText(t.content||" ");
            t.w = m.width*t.scaleW; t.h = fs*t.scaleH;
            ctx.translate(canvas.width*t.x, canvas.height*t.y);
            ctx.rotate(t.rot*Math.PI/180);
            if(i === activeDragIdx) {
                ctx.strokeStyle = '#32CD32'; ctx.lineWidth = 4;
                ctx.strokeRect(-t.w/2-15, -t.h/2-15, t.w+30, t.h+30);
                
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(t.w/2 + 20, -HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
                ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
                ctx.strokeRect(t.w/2 + 20, -HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);

                ctx.fillStyle = '#009ce2';
                ctx.fillRect(-HANDLE_SIZE/2, t.h/2 + 20, HANDLE_SIZE, HANDLE_SIZE);
                ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
                ctx.strokeRect(-HANDLE_SIZE/2, t.h/2 + 20, HANDLE_SIZE, HANDLE_SIZE);
            }
            if(t.content) {
                ctx.globalAlpha = t.alpha;
                const baseStroke = parseFloat(document.getElementById('s').value);
                const avgScale = (t.scaleW + t.scaleH) / 2;
                const scaledStroke = baseStroke * avgScale * t.size;
                
                if(document.getElementById('shd').checked) { 
                    ctx.scale(t.scaleW, t.scaleH);
                    ctx.shadowColor=document.getElementById('sCol').value; 
                    ctx.shadowBlur=scaledStroke; 
                    ctx.fillStyle = 'white'; ctx.fillText(t.content, 0, 0);
                } else { 
                    ctx.strokeStyle=document.getElementById('sCol').value; 
                    ctx.lineWidth=scaledStroke; 
                    ctx.lineJoin = 'round';
                    ctx.miterLimit = 2;
                    
                    ctx.save();
                    ctx.scale(t.scaleW, t.scaleH);
                    ctx.strokeText(t.content,0,0);
                    ctx.restore();

                    ctx.save();
                    ctx.scale(t.scaleW, t.scaleH);
                    ctx.fillStyle = 'white'; ctx.fillText(t.content, 0, 0);
                    ctx.restore();
                }
            }
            ctx.restore();
        });
    }

    function getPointersDistAndAngle() {
        const ids = Object.keys(activePointers);
        if(ids.length < 2) return null;
        const p1 = activePointers[ids[0]];
        const p2 = activePointers[ids[1]];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        return {
            dist: Math.sqrt(dx*dx + dy*dy),
            angle: Math.atan2(dy, dx)
        };
    }

    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX-rect.left)*(canvas.width/rect.width);
        const ey = (e.clientY-rect.top)*(canvas.height/rect.height);
        
        activePointers[e.pointerId] = { x: ex, y: ey };
        const pIds = Object.keys(activePointers);

        if(pIds.length === 2 && activeDragIdx !== null) {
            dragMode = 'pinch';
            const data = getPointersDistAndAngle();
            if(data) {
                startDist = data.dist;
                startAngle = data.angle;
                startSW = texts[activeDragIdx].scaleW;
                startSH = texts[activeDragIdx].scaleH;
                startRot = parseFloat(texts[activeDragIdx].rot);
            }
            return;
        }

        if(pIds.length > 1) return;

        if(activeDragIdx !== null) {
            const t = texts[activeDragIdx], cx = t.x*canvas.width, cy = t.y*canvas.height;
            const rad = t.rot * Math.PI / 180;
            const lx = (ex - cx) * Math.cos(-rad) - (ey - cy) * Math.sin(-rad);
            const ly = (ex - cx) * Math.sin(-rad) + (ey - cy) * Math.cos(-rad);
            
            const rightX = t.w/2 + 20 + HANDLE_SIZE/2;
            const rightY = 0;
            if(Math.abs(lx - rightX) <= (HANDLE_SIZE/2 + HITBOX_PADDING) && Math.abs(ly - rightY) <= (HANDLE_SIZE/2 + HITBOX_PADDING)) {
                dragMode='width'; startSW=t.scaleW; startDist=lx; canvas.setPointerCapture(e.pointerId); return;
            }
            
            const bottomX = 0;
            const bottomY = t.h/2 + 20 + HANDLE_SIZE/2;
            if(Math.abs(lx - bottomX) <= (HANDLE_SIZE/2 + HITBOX_PADDING) && Math.abs(ly - bottomY) <= (HANDLE_SIZE/2 + HITBOX_PADDING)) {
                dragMode='height'; startSH=t.scaleH; startDist=ly; canvas.setPointerCapture(e.pointerId); return;
            }
        }
        
        let f = null;
        for(let i=texts.length-1; i>=0; i--) {
            const t = texts[i];
            const cx = t.x * canvas.width, cy = t.y * canvas.height;
            const rad = t.rot * Math.PI / 180;
            const lx = (ex - cx) * Math.cos(-rad) - (ey - cy) * Math.sin(-rad);
            const ly = (ex - cx) * Math.sin(-rad) + (ey - cy) * Math.cos(-rad);

            if(Math.abs(lx) < (Math.max(t.w, 50)/2 + 20) && Math.abs(ly) < (Math.max(t.h, 50)/2 + 20)) { 
                f=i; break; 
            }
        }
        
        if(f !== null) { activeDragIdx=f; dragMode='move'; startX=ex; startY=ey; startTX=texts[f].x; startTY=texts[f].y; canvas.classList.add('active-drag'); document.getElementById('doneBtn').style.display='block'; canvas.setPointerCapture(e.pointerId); requestRender();
        } else finishMove();
    });

    canvas.addEventListener('pointermove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX-rect.left)*(canvas.width/rect.width);
        const ey = (e.clientY-rect.top)*(canvas.height/rect.height);
        
        if (activePointers[e.pointerId]) {
            activePointers[e.pointerId] = { x: ex, y: ey };
        }

        if(activeDragIdx===null) return;

        if(dragMode === 'pinch') {
            const data = getPointersDistAndAngle();
            if(data) {
                const t = texts[activeDragIdx];
                const scaleFactor = data.dist / startDist;
                t.scaleW = Math.max(0.1, startSW * scaleFactor);
                t.scaleH = Math.max(0.1, startSH * scaleFactor);
                
                let deltaAngle = (data.angle - startAngle) * 180 / Math.PI;
                let newRot = (startRot + deltaAngle) % 360;
                if (newRot > 180) newRot -= 360;
                if (newRot < -180) newRot += 360;
                t.rot = newRot.toFixed(1);
                
                requestRender();
            }
            return;
        }

        if(!canvas.hasPointerCapture(e.pointerId)) return;
        const t = texts[activeDragIdx];
        if(dragMode==='move') { t.x=startTX+(ex-startX)/canvas.width; t.y=startTY+(ey-startY)/canvas.height; }
        else {
            const cx=t.x*canvas.width, cy=t.y*canvas.height;
            const rad = t.rot * Math.PI / 180;
            const lx = (ex - cx) * Math.cos(-rad) - (ey - cy) * Math.sin(-rad);
            const ly = (ex - cx) * Math.sin(-rad) + (ey - cy) * Math.cos(-rad);
            
            if(dragMode==='width') t.scaleW=Math.max(0.1, startSW*(lx/startDist));
            if(dragMode==='height') t.scaleH=Math.max(0.1, startSH*(ly/startDist));
        }
        requestRender();
    });

    const stopDrag = (e) => {
        delete activePointers[e.pointerId];
        const pIds = Object.keys(activePointers);
        
        if(dragMode === 'pinch' && pIds.length < 2) {
            dragMode = null;
        } else if(pIds.length === 0) {
            dragMode=null;
            if(canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
        }
    };
    canvas.addEventListener('pointerup', stopDrag);
    canvas.addEventListener('pointercancel', stopDrag);

    function finishMove() { activeDragIdx=null; dragMode=null; activePointers={}; canvas.classList.remove('active-drag'); document.getElementById('doneBtn').style.display='none'; refreshInputs(); requestRender(); }

    function download() {
        if(!baseImg) return;
        const temp = document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height;
        const tctx = temp.getContext('2d'); tctx.drawImage(qCache, 0, 0);
        texts.forEach(t => {
            const fs = (temp.width/10)*t.size; tctx.save(); tctx.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
            tctx.textAlign='center'; tctx.textBaseline='middle'; tctx.translate(temp.width*t.x, temp.height*t.y); tctx.rotate(t.rot*Math.PI/180);
            if(t.content) {
                tctx.globalAlpha=t.alpha;
                const baseStroke = parseFloat(document.getElementById('s').value);
                const avgScale = (t.scaleW + t.scaleH) / 2;
                const scaledStroke = baseStroke * avgScale * t.size;

                if(document.getElementById('shd').checked) { 
                    tctx.scale(t.scaleW, t.scaleH);
                    tctx.shadowColor=document.getElementById('sCol').value; 
                    tctx.shadowBlur=scaledStroke; 
                    tctx.fillStyle='white'; tctx.fillText(t.content, 0, 0);
                } else { 
                    tctx.strokeStyle=document.getElementById('sCol').value; 
                    tctx.lineWidth=scaledStroke; 
                    tctx.lineJoin = 'round';
                    tctx.miterLimit = 2;
                    
                    tctx.save();
                    tctx.scale(t.scaleW, t.scaleH);
                    tctx.strokeText(t.content,0,0); 
                    tctx.restore();

                    tctx.save();
                    tctx.scale(t.scaleW, t.scaleH);
                    tctx.fillStyle='white'; tctx.fillText(t.content, 0, 0);
                    tctx.restore();
                }
            }
            tctx.restore();
        });
        const dataUrl = temp.toDataURL('image/jpeg', document.getElementById('quality').value/100);
        const fileName = 'img_' + Date.now() + '.jpg';
        const newTab = window.open();
        newTab.document.write(`
            <html>
            <head>
                <title>Download Image</title>
                <style>
                    body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
                    img { max-width: 100%; max-height: 70vh; border: 2px solid #444; border-radius: 8px; margin-bottom: 30px; }
                    .dl-btn { background: #32CD32; color: black; text-decoration: none; padding: 20px 40px; border-radius: 8px; font-weight: bold; font-size: 20px; text-transform: uppercase; }
                </style>
            </head>
            <body>
                <img src="${dataUrl}">
                <a href="${dataUrl}" download="${fileName}" class="dl-btn">DOWNLOAD IMAGE</a>
            </body>
            </html>
        `);
    }
</script>
</body>
</html>
