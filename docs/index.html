<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meme Maker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        canvas { max-width: 100%; height: auto; background-color: #000; display: block; touch-action: none; border: 2px solid #444; border-radius: 4px; margin: 15px 0; cursor: crosshair; }
        canvas.active-drag { border: 2px solid #32CD32; }
        
        .text-row { display: flex; gap: 8px; background: #222; padding: 10px; border-radius: 10px; border: 1px solid #333; align-items: center; }
        input[type="text"] { flex-grow: 1; background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; font-weight: bold; }
        
        button { cursor: pointer; font-weight: 800; text-transform: uppercase; border-radius: 8px; border: none; transition: all 0.1s; }
        .btn-up { background: #333; color: white; padding: 12px; border: 1px dashed #555; }
        .btn-add { background: #007bff; color: white; padding: 12px; }
        .btn-save { background: #32CD32; color: black; padding: 18px; font-size: 20px; margin-bottom: 40px; width: 100%; }
        .btn-del { background: #ff4444; color: white; width: 40px; height: 40px; }
        
        .btn-done { background: #32CD32; color: black; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; padding: 25px; font-size: 22px; }
        label { font-size: 11px; color: #888; display: flex; flex-direction: column; gap: 4px; }
    </style>
</head>
<body>

    <div class="controls">
        <h1 style="text-align:center; margin: 10px 0; color: #32CD32;">MEME ENGINE</h1>
        <button class="btn-up" onclick="document.getElementById('gallery').click()">📁 Select Image</button>
        <input type="file" id="gallery" accept="image/*" style="display:none">
        
        <div id="cropWrap" style="display:none; height: 300px;"><img id="cropImg"></div>
        <button id="applyBtn" style="display:none; background:#2ecc71; color:white; padding:15px; margin-bottom: 10px;" onclick="applyCrop()">✂️ CUT & APPLY</button>
        
        <div id="textInputs" style="display: flex; flex-direction: column; gap: 8px;"></div>
        <button class="btn-add" onclick="addText()">+ ADD NEW TEXT</button>
        
        <div class="settings">
            <label>OUTLINE THICKNESS <input type="range" id="s" min="0" max="30" value="12" oninput="render()"></label>
            <label>OUTLINE COLOR <input type="color" id="sCol" value="#000000" oninput="render()"></label>
            <label>CONTRAST <input type="range" id="con" min="50" max="200" value="100" onchange="processBaseAndRender()"></label>
            <label>SATURATION <input type="range" id="sat" min="0" max="200" value="100" onchange="processBaseAndRender()"></label>
        </div>
    </div>

    <canvas id="memeCanvas"></canvas>
    <button id="doneBtn" class="btn-done" onclick="finishMove()">OK, PLACED IT</button>

    <div class="controls">
        <button class="btn-save" onclick="download()">💾 SAVE TO DEVICE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // --- THE IMPACT PATH FIX ---
        // Since it's in the same folder as index.html, we use './impact.ttf'
        const impactFont = new FontFace('RealImpact', 'url(./impact.ttf)');
        impactFont.load().then((font) => {
            document.fonts.add(font);
            console.log("Real Impact Loaded!");
            render();
        }).catch(e => {
            console.error("Font failed to load from folder. Falling back to system.");
        });

        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const off = document.createElement('canvas'), proc = document.createElement('canvas');
        const pctx = proc.getContext('2d');
        
        let cropper, baseImg = null, texts = [], activeDragIdx = null;
        let startPointerX, startPointerY, startTextX, startTextY;

        function addText() { 
            texts.push({ content: "NEW TEXT", x: 0.5, y: 0.5, size: 1.2, rot: 0, width: 0, height: 0 }); 
            refreshInputs(); render(); 
        }

        function refreshInputs() {
            const container = document.getElementById('textInputs'); container.innerHTML = '';
            texts.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = "text-row";
                div.innerHTML = `<input type="text" value="${t.content}" oninput="texts[${i}].content=this.value; render()">
                                 <button class="btn-del" onclick="texts.splice(${i},1); refreshInputs(); render()">✕</button>`;
                container.appendChild(div);
            });
        }

        document.getElementById('gallery').onchange = (e) => {
            const file = e.target.files[0], reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropWrap').style.display = 'block';
                document.getElementById('applyBtn').style.display = 'block';
                const el = document.getElementById('cropImg'); el.src = ev.target.result;
                if(cropper) cropper.destroy();
                cropper = new Cropper(el, { viewMode: 1, aspectRatio: NaN });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            baseImg = new Image();
            baseImg.onload = () => {
                canvas.width = off.width = proc.width = baseImg.width;
                canvas.height = off.height = proc.height = baseImg.height;
                off.getContext('2d').drawImage(baseImg, 0, 0);
                document.getElementById('cropWrap').style.display = 'none';
                document.getElementById('applyBtn').style.display = 'none';
                processBaseAndRender();
            };
            baseImg.src = cropper.getCroppedCanvas().toDataURL();
        }

        function processBaseAndRender() {
            if(!baseImg) return;
            pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
            pctx.drawImage(off, 0, 0); render();
        }

        function render() {
            if(!baseImg) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(proc, 0, 0);
            texts.forEach((t, i) => drawText(t, ctx, i === activeDragIdx));
        }

        function drawText(t, targetCtx, isActive) {
            const content = t.content.toUpperCase();
            const lines = content.split('\\n');
            let fs = (canvas.width / 8) * t.size;
            
            targetCtx.save();
            // Critical design: 900 weight + RealImpact + Tight Line Height
            targetCtx.font = `900 ${fs}px RealImpact, Impact, Arial Black, sans-serif`;
            targetCtx.textAlign = 'center';
            targetCtx.textBaseline = 'middle';
            
            let m = targetCtx.measureText(content);
            t.width = m.width;
            t.height = fs * lines.length;

            targetCtx.translate(canvas.width * t.x, canvas.height * t.y);
            
            if (isActive) {
                targetCtx.strokeStyle = '#32CD32';
                targetCtx.lineWidth = 4;
                targetCtx.strokeRect(-t.width/2 - 20, -t.height/2 - 20, t.width + 40, t.height + 40);
            }

            lines.forEach((line, i) => {
                targetCtx.save();
                targetCtx.translate(0, (i - (lines.length-1)/2) * fs * 0.85); // Tight lines
                
                targetCtx.strokeStyle = document.getElementById('sCol').value;
                targetCtx.lineWidth = document.getElementById('s').value * (canvas.width / 1000);
                targetCtx.lineJoin = "round";
                targetCtx.miterLimit = 2;
                targetCtx.strokeText(line, 0, 0);
                
                targetCtx.fillStyle = 'white';
                targetCtx.fillText(line, 0, 0);
                targetCtx.restore();
            });
            targetCtx.restore();
        }

        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
            const ey = (e.clientY - rect.top) * (canvas.height / rect.height);

            for(let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                const cx = t.x * canvas.width, cy = t.y * canvas.height;
                if (Math.abs(ex - cx) < t.width/2 + 30 && Math.abs(ey - cy) < t.height/2 + 30) {
                    activeDragIdx = i; startPointerX = ex; startPointerY = ey;
                    startTextX = t.x; startTextY = t.y;
                    document.getElementById('doneBtn').style.display = 'block';
                    canvas.classList.add('active-drag');
                    canvas.setPointerCapture(e.pointerId); render(); break;
                }
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (activeDragIdx === null) return;
            const rect = canvas.getBoundingClientRect();
            const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
            const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            const t = texts[activeDragIdx];
            t.x = startTextX + (ex - startPointerX) / canvas.width;
            t.y = startTextY + (ey - startPointerY) / canvas.height;
            render();
        });

        function finishMove() {
            activeDragIdx = null;
            document.getElementById('doneBtn').style.display = 'none';
            canvas.classList.remove('active-drag'); render();
        }

        function download() {
            finishMove();
            setTimeout(() => {
                const link = document.createElement('a');
                link.download = 'classic-meme.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            }, 100);
        }
    </script>
</body>
</html>
