<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Maker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { 
            --bg-color: #1a1a1a; 
            --control-bg: #2d2d2d; 
            --btn-dark: #404040; 
            --btn-blue: #0088cc; 
            --btn-red: #d9534f; 
            --accent: #32CD32;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-color); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .ui-wrapper { width: 100%; max-width: 500px; padding: 15px; padding-bottom: 120px; }
        h1 { margin: 10px 0 20px 0; font-size: 24px; font-weight: 900; text-transform: lowercase; letter-spacing: -1px; }
        
        button { 
            width: 100%; border: none; border-radius: 8px; padding: 16px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
            font-size: 14px; margin-bottom: 12px; transition: opacity 0.2s;
        }
        .btn-upload { background: var(--btn-dark); color: #fff; border: 1px solid #555; }
        .btn-add { background: var(--btn-blue); color: white; margin-bottom: 15px; }
        .btn-save { background: #ffffff; color: #000; margin-top: 20px; font-size: 16px; }
        .btn-done { 
            background: var(--accent); color: black; position: fixed; 
            bottom: 0; left: 0; width: 100%; z-index: 9999; display: none; 
            padding: 25px; font-size: 18px; box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }

        /* Text Input Styling */
        .text-block { background: var(--control-bg); padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .input-row { display: flex; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        .input-row input[type="text"] { 
            flex-grow: 1; padding: 12px; border: none; font-size: 16px; 
            background: #eee; color: #000; font-weight: bold; outline: none; 
        }
        .btn-del { background: var(--btn-red); color: white; width: 50px; margin-bottom: 0; border-radius: 0; padding: 0; font-size: 20px; }
        
        /* Sliders Grid */
        .sro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sro-grid label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; font-weight: bold; }
        .sro-grid input[type="range"] { flex: 1; accent-color: var(--btn-blue); }

        /* Main Settings */
        .settings-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            background: var(--control-bg); padding: 15px; border-radius: 10px; margin-top: 10px; 
        }
        .control-item { display: flex; flex-direction: column; gap: 6px; }
        .control-item label { font-size: 10px; color: #888; letter-spacing: 1px; font-weight: bold; }
        .swatch-box { width: 100%; height: 35px; border-radius: 4px; border: 2px solid #555; position: relative; overflow: hidden; }
        input[type="color"] { opacity: 0; width: 100%; height: 100%; cursor: pointer; position: absolute; }

        /* Canvas Area */
        .canvas-container { width: 100%; background: #000; border-radius: 8px; margin-top: 15px; overflow: hidden; line-height: 0; }
        canvas { width: 100%; height: auto; touch-action: none; }
        canvas.active-drag { outline: 4px solid var(--accent); outline-offset: -4px; }

        /* Cropper */
        #cropWrap { width: 100%; display: none; background: #000; margin-bottom: 10px; }
        #cropImg { max-width: 100%; display: block; }

        @font-face { font-family: 'ImpactCustom'; src: url('impact.ttf'); font-weight: normal; }
    </style>
</head>
<body>

<div class="ui-wrapper">
    <h1>images maker</h1>
    
    <button class="btn-upload" onclick="document.getElementById('gallery').click()">Upload Image</button>
    <input type="file" id="gallery" accept="image/*" style="display:none">
    
    <div id="cropWrap"><img id="cropImg"></div>
    <button id="applyBtn" class="btn-add" onclick="applyCrop()" style="display:none; background:var(--accent); color:black;">Confirm Crop</button>

    <div id="textInputs"></div>
    <button class="btn-add" onclick="addText()">+ Add Text Layer</button>

    <div class="settings-grid">
        <div class="control-item"><label>QUALITY</label><input type="range" id="quality" min="1" max="100" value="92" oninput="queueQuality()"></div>
        <div class="control-item"><label>NOISE</label><input type="range" id="noise" min="0" max="100" value="0" onchange="processBase()"></div>
        <div class="control-item"><label>CONTRAST</label><input type="range" id="con" min="50" max="250" value="100" onchange="processBase()"></div>
        <div class="control-item"><label>SATURATION</label><input type="range" id="sat" min="0" max="300" value="100" onchange="processBase()"></div>
        <div class="control-item"><label>STROKE SIZE</label><input type="range" id="s" min="0" max="20" value="5" oninput="requestRender()"></div>
        <div class="control-item"><label>STROKE COLOR</label><div class="swatch-box" id="cDisp" style="background:#000000"><input type="color" id="sCol" value="#000000" oninput="document.getElementById('cDisp').style.background=this.value; requestRender()"></div></div>
        <div class="control-item"><label>SHADOW MODE</label><input type="checkbox" id="shd" onchange="requestRender()" style="width:30px; height:30px;"></div>
    </div>

    <div class="canvas-container"><canvas id="memeCanvas"></canvas></div>
    <button class="btn-save" onclick="download()">Save Image</button>
</div>

<button id="doneBtn" class="btn-done" onclick="finishMove()">✓ DONE EDITING</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('memeCanvas'), ctx = canvas.getContext('2d', {alpha: false});
    const off = document.createElement('canvas'), proc = document.createElement('canvas'), pctx = proc.getContext('2d', {alpha: false});
    const qCache = document.createElement('canvas'), qctx = qCache.getContext('2d', {alpha: false});
    
    let cropper, baseImg = null, texts = [], activeDragIdx = null, dragMode = null;
    let isUpdatingQ = false, needsQ = false, rafPending = false;
    let startX, startY, startTX, startTY, startSW, startSH, startDist;

    // --- UI CONTROLS ---
    function refreshInputs() {
        const container = document.getElementById('textInputs'); container.innerHTML = '';
        texts.forEach((t, i) => {
            const div = document.createElement('div'); div.className = 'text-block';
            div.innerHTML = `
                <div class="input-row">
                    <input type="text" placeholder="Type here..." value="${t.content}" oninput="texts[${i}].content=this.value; requestRender()">
                    <button class="btn-del" onclick="removeText(${i})">×</button>
                </div>
                <div class="sro-grid">
                    <label>SIZE <input type="range" min="0.1" max="6" step="0.1" value="${t.size}" oninput="texts[${i}].size=parseFloat(this.value); requestRender()"></label>
                    <label>ROT <input type="range" min="-180" max="180" value="${t.rot}" oninput="texts[${i}].rot=this.value; requestRender()"></label>
                    <label>OPACITY <input type="range" min="0" max="1" step="0.1" value="${t.alpha}" oninput="texts[${i}].alpha=this.value; requestRender()"></label>
                </div>`;
            container.appendChild(div);
        });
    }

    function addText() { 
        texts.push({content:"", x:0.5, y:0.5, size:1, scaleW:1, scaleH:1, rot:0, alpha:1, w:0, h:0}); 
        refreshInputs(); 
        requestRender(); 
    }

    function removeText(i) { 
        texts.splice(i,1); 
        if(activeDragIdx===i) activeDragIdx=null; 
        refreshInputs(); 
        requestRender(); 
    }

    // --- IMAGE LOADING & CROPPING ---
    document.getElementById('gallery').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const el = document.getElementById('cropImg');
        if(el.src && el.src.startsWith('blob:')) URL.revokeObjectURL(el.src);
        
        const url = URL.createObjectURL(file);
        document.getElementById('cropWrap').style.display = 'block';
        document.getElementById('applyBtn').style.display = 'block';
        
        if(cropper) cropper.destroy();
        el.onload = () => { cropper = new Cropper(el, {viewMode:1, autoCropArea:1}); };
        el.src = url;
        e.target.value = ''; 
    };

    function applyCrop() {
        if(!cropper) return;
        const cropped = cropper.getCroppedCanvas();
        baseImg = new Image();
        baseImg.onload = () => {
            canvas.width = off.width = proc.width = qCache.width = baseImg.width;
            canvas.height = off.height = proc.height = qCache.height = baseImg.height;
            off.getContext('2d').drawImage(baseImg, 0, 0);
            document.getElementById('cropWrap').style.display = 'none';
            document.getElementById('applyBtn').style.display = 'none';
            processBase();
        };
        baseImg.src = cropped.toDataURL('image/png');
        cropper.destroy(); cropper = null;
    }

    // --- FILTERS & QUALITY ---
    function processBase() {
        if(!baseImg) return;
        pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
        pctx.drawImage(off, 0, 0);
        const n = document.getElementById('noise').value;
        if(n > 0) {
            const d = pctx.getImageData(0,0,proc.width,proc.height);
            for(let i=0; i<d.data.length; i+=4) { let r = (Math.random()-0.5)*n; d.data[i]+=r; d.data[i+1]+=r; d.data[i+2]+=r; }
            pctx.putImageData(d,0,0);
        }
        queueQuality();
    }

    function queueQuality() { needsQ = true; if(!isUpdatingQ) updateQuality(); }
    
    function updateQuality() {
        if(!baseImg) return; isUpdatingQ = true; needsQ = false;
        const qVal = document.getElementById('quality').value / 100;
        const img = new Image();
        img.onload = () => { 
            qctx.drawImage(img, 0, 0); 
            requestRender(); 
            isUpdatingQ = false; 
            if(needsQ) updateQuality(); 
        };
        img.src = proc.toDataURL('image/jpeg', qVal);
    }

    // --- RENDERING ---
    function requestRender() { if(!rafPending) { rafPending = true; requestAnimationFrame(render); } }

    function render() {
        rafPending = false; if(!baseImg) return;
        ctx.drawImage(qCache, 0, 0);
        texts.forEach((t, i) => {
            const fs = (canvas.width/10)*t.size;
            ctx.save();
            ctx.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const m = ctx.measureText(t.content||" ");
            t.w = m.width*t.scaleW; t.h = fs*t.scaleH;
            ctx.translate(canvas.width*t.x, canvas.height*t.y);
            ctx.rotate(t.rot*Math.PI/180);
            
            if(i === activeDragIdx) {
                ctx.strokeStyle = '#32CD32'; ctx.lineWidth = 4;
                ctx.strokeRect(-t.w/2-15, -t.h/2-15, t.w+30, t.h+30);
                // Resize anchors
                ctx.fillStyle = '#ff4436'; ctx.fillRect(t.w/2+10, -t.h/2-60, 50, 50); // Uni-Scale
                ctx.fillStyle = '#3498db'; ctx.fillRect(t.w/2+20, -25, 40, 50); // Width
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(-25, t.h/2+20, 50, 40); // Height
            }
            
            if(t.content) {
                ctx.globalAlpha = t.alpha; ctx.scale(t.scaleW, t.scaleH);
                if(document.getElementById('shd').checked) { 
                    ctx.shadowColor=document.getElementById('sCol').value; 
                    ctx.shadowBlur=document.getElementById('s').value; 
                } else { 
                    ctx.strokeStyle=document.getElementById('sCol').value; 
                    ctx.lineWidth=document.getElementById('s').value; 
                    ctx.strokeText(t.content,0,0); 
                }
                ctx.fillStyle = 'white'; ctx.fillText(t.content, 0, 0);
            }
            ctx.restore();
        });
    }

    // --- INTERACTION ---
    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect(), 
              ex = (e.clientX-rect.left)*(canvas.width/rect.width), 
              ey = (e.clientY-rect.top)*(canvas.height/rect.height);
        
        if(activeDragIdx !== null) {
            const t = texts[activeDragIdx], cx = t.x*canvas.width, cy = t.y*canvas.height, ang = -t.rot*Math.PI/180;
            const lx = (ex-cx)*Math.cos(ang)-(ey-cy)*Math.sin(ang), ly = (ex-cx)*Math.sin(ang)+(ey-cy)*Math.cos(ang);
            if(lx>t.w/2 && ly<-t.h/2) { dragMode='size'; startSW=t.scaleW; startDist=Math.sqrt(lx*lx+ly*ly); canvas.setPointerCapture(e.pointerId); return; }
            if(lx>t.w/2) { dragMode='width'; startSW=t.scaleW; startDist=lx; canvas.setPointerCapture(e.pointerId); return; }
            if(ly>t.h/2) { dragMode='height'; startSH=t.scaleH; startDist=ly; canvas.setPointerCapture(e.pointerId); return; }
        }
        
        let found = null;
        for(let i=texts.length-1; i>=0; i--) {
            const t=texts[i]; 
            if(Math.abs(ex - t.x*canvas.width) < (Math.max(t.w,80)/2+40) && Math.abs(ey - t.y*canvas.height) < (Math.max(t.h,80)/2+40)) { found=i; break; }
        }
        
        if(found !== null) {
            activeDragIdx=found; dragMode='move'; startX=ex; startY=ey; startTX=texts[found].x; startTY=texts[found].y;
            canvas.classList.add('active-drag'); 
            document.getElementById('doneBtn').style.display='block';
            canvas.setPointerCapture(e.pointerId); requestRender();
        } else { finishMove(); }
    });

    canvas.addEventListener('pointermove', (e) => {
        if(activeDragIdx===null || !canvas.hasPointerCapture(e.pointerId)) return;
        const rect = canvas.getBoundingClientRect(), 
              ex = (e.clientX-rect.left)*(canvas.width/rect.width), 
              ey = (e.clientY-rect.top)*(canvas.height/rect.height), 
              t = texts[activeDragIdx];
        
        if(dragMode==='move') { 
            t.x=startTX+(ex-startX)/canvas.width; t.y=startTY+(ey-startY)/canvas.height; 
        } else {
            const cx=t.x*canvas.width, cy=t.y*canvas.height, ang=-t.rot*Math.PI/180;
            const lx=(ex-cx)*Math.cos(ang)-(ey-cy)*Math.sin(ang), ly=(ex-cx)*Math.sin(ang)+(ey-cy)*Math.cos(ang);
            if(dragMode==='size') { const r=Math.sqrt(lx*lx+ly*ly)/startDist; t.scaleW*=r; t.scaleH*=r; startDist=Math.sqrt(lx*lx+ly*ly); }
            if(dragMode==='width') t.scaleW=Math.max(0.1, startSW*(lx/startDist));
            if(dragMode==='height') t.scaleH=Math.max(0.1, startSH*(ly/startDist));
        }
        requestRender();
    });

    const rel = (e) => { dragMode=null; if(canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId); };
    canvas.addEventListener('pointerup', rel);
    canvas.addEventListener('pointercancel', rel);

    function finishMove() { 
        activeDragIdx=null; dragMode=null; 
        canvas.classList.remove('active-drag'); 
        document.getElementById('doneBtn').style.display='none'; 
        requestRender(); 
    }

    // --- SAVING LOGIC (Fixed for multiple downloads) ---
    function download() {
        if(!baseImg) return;
        const btn = document.querySelector('.btn-save');
        btn.innerText = "Processing...";
        
        const temp = document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height;
        const tctx = temp.getContext('2d'); tctx.drawImage(qCache, 0, 0);
        
        texts.forEach(t => {
            const fs = (temp.width/10)*t.size; tctx.save(); 
            tctx.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
            tctx.textAlign='center'; tctx.textBaseline='middle'; 
            tctx.translate(temp.width*t.x, temp.height*t.y); tctx.rotate(t.rot*Math.PI/180);
            if(t.content) {
                tctx.globalAlpha=t.alpha; tctx.scale(t.scaleW, t.scaleH);
                if(document.getElementById('shd').checked) { tctx.shadowColor=document.getElementById('sCol').value; tctx.shadowBlur=document.getElementById('s').value; }
                else { tctx.strokeStyle=document.getElementById('sCol').value; tctx.lineWidth=document.getElementById('s').value; tctx.strokeText(t.content,0,0); }
                tctx.fillStyle='white'; tctx.fillText(t.content, 0, 0);
            }
            tctx.restore();
        });
        
        const qVal = document.getElementById('quality').value / 100;
        temp.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const l = document.createElement('a');
            l.download = `img_${Math.floor(Math.random()*10000)}.jpg`;
            l.href = url;
            document.body.appendChild(l);
            l.click();
            
            setTimeout(() => {
                document.body.removeChild(l);
                URL.revokeObjectURL(url);
                btn.innerText = "Save Image";
                temp.width = temp.height = 0;
            }, 150);
        }, 'image/jpeg', qVal);
    }
</script>
</body>
</html>
