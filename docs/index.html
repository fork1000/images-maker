<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meme Maker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        /* THE OLD DESIGN YOU LIKED */
        * { box-sizing: border-box; }
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; }
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #333; padding: 10px; border-radius: 8px; font-size: 10px; border: 1px solid #444; }
        canvas { max-width: 100%; height: auto; margin-top: 10px; background-color: #000; display: block; touch-action: none; border: 2px solid #333; }
        input[type="text"], button { padding: 12px; font-size: 14px; border: none; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-up { background: #444; color: white; width: 100%; }
        .btn-apply { background: #2ecc71; color: white; margin-top: 5px; width: 100%; }
        .btn-save { background: #f1c40f; color: black; margin: 15px 0 40px 0; width: 100%; font-size: 18px; }
        .btn-add { background: #3498db; color: white; width: 100%; }
        .text-row { display: flex; gap: 5px; width: 100%; }
        .text-row input { flex-grow: 1; background: #fff; color: #000; font-weight: bold; }
        .btn-del { background: #e74c3c; color: white; width: 45px; }
        label { display: flex; flex-direction: column; gap: 2px; text-transform: uppercase; color: #bbb; }
        #status { font-size: 10px; color: #32CD32; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="controls">
        <div id="status">Checking for Impact...</div>
        <button class="btn-up" onclick="document.getElementById('gallery').click()">1. UPLOAD IMAGE</button>
        <input type="file" id="gallery" accept="image/*" style="display:none">
        
        <div id="cropWrap" style="display:none; height: 300px; overflow:hidden;"><img id="cropImg" style="max-width:100%;"></div>
        <button id="applyBtn" class="btn-apply" onclick="applyCrop()" style="display:none">CONFIRM CROP</button>
        
        <div id="textInputs" style="display: flex; flex-direction: column; gap: 8px; margin: 10px 0;"></div>
        <button class="btn-add" onclick="addText()">+ ADD TEXT</button>
        
        <div class="settings">
            <label>OUTLINE <input type="range" id="s" min="0" max="30" value="12" oninput="render()"></label>
            <label>COLOR <input type="color" id="sCol" value="#000000" oninput="render()"></label>
            <label>CONTRAST <input type="range" id="con" min="50" max="250" value="100" onchange="processBaseAndRender()"></label>
            <label>SATURATION <input type="range" id="sat" min="0" max="300" value="100" onchange="processBaseAndRender()"></label>
        </div>
    </div>

    <canvas id="memeCanvas"></canvas>

    <div class="controls">
        <button class="btn-save" onclick="download()">SAVE IMAGE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const off = document.createElement('canvas'), proc = document.createElement('canvas');
        const pctx = proc.getContext('2d');
        const statusEl = document.getElementById('status');
        
        let cropper, baseImg = null, texts = [];

        // --- THE ONLY WAY TO ENSURE IMPACT LOADS ---
        const fontName = 'ImpactFont';
        // We use the absolute relative path. Make sure file is 'impact.ttf' NOT 'Impact.ttf'
        const myFont = new FontFace(fontName, 'url(impact.ttf)');

        myFont.load().then((loadedFont) => {
            document.fonts.add(loadedFont);
            statusEl.innerText = "IMPACT LOADED!";
            render();
        }).catch(err => {
            statusEl.style.color = "red";
            statusEl.innerText = "FONT FILE NOT FOUND! Check filename.";
        });

        function addText() { 
            texts.push({ content: "NEW TEXT", x: 0.5, y: 0.5, size: 1.2 }); 
            refreshInputs(); render(); 
        }

        function refreshInputs() {
            const container = document.getElementById('textInputs'); container.innerHTML = '';
            texts.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = "text-row";
                div.innerHTML = `<input type="text" value="${t.content}" oninput="texts[${i}].content=this.value; render()">
                                 <button class="btn-del" onclick="texts.splice(${i},1); refreshInputs(); render()">✕</button>`;
                container.appendChild(div);
            });
        }

        document.getElementById('gallery').onchange = (e) => {
            const file = e.target.files[0], reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropWrap').style.display = 'block';
                document.getElementById('applyBtn').style.display = 'block';
                const el = document.getElementById('cropImg'); el.src = ev.target.result;
                if(cropper) cropper.destroy();
                cropper = new Cropper(el, { viewMode: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            baseImg = new Image();
            baseImg.onload = () => {
                canvas.width = off.width = proc.width = baseImg.width;
                canvas.height = off.height = proc.height = baseImg.height;
                off.getContext('2d').drawImage(baseImg, 0, 0);
                document.getElementById('cropWrap').style.display = 'none';
                document.getElementById('applyBtn').style.display = 'none';
                processBaseAndRender();
            };
            baseImg.src = cropper.getCroppedCanvas().toDataURL();
        }

        function processBaseAndRender() {
            if(!baseImg) return;
            pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
            pctx.drawImage(off, 0, 0); render();
        }

        function render() {
            if(!baseImg) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(proc, 0, 0);
            texts.forEach(t => drawText(t, ctx));
        }

        function drawText(t, targetCtx) {
            const content = t.content.toUpperCase();
            let fs = (canvas.width / 9) * t.size;
            
            targetCtx.save();
            // We use ONLY the loaded Impact name. No fallbacks allowed here so we can see if it fails.
            targetCtx.font = `900 ${fs}px ImpactFont`;
            targetCtx.textAlign = 'center';
            targetCtx.textBaseline = 'middle';
            
            targetCtx.translate(canvas.width * t.x, canvas.height * t.y);
            
            targetCtx.strokeStyle = document.getElementById('sCol').value;
            targetCtx.lineWidth = document.getElementById('s').value;
            targetCtx.lineJoin = "round";
            targetCtx.miterLimit = 2;
            targetCtx.strokeText(content, 0, 0);
            
            targetCtx.fillStyle = 'white';
            targetCtx.fillText(content, 0, 0);
            targetCtx.restore();
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'meme.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }
    </script>
</body>
</html>
