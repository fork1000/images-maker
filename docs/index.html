<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>images maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #2c2c2c; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 500px; }
        
        h1 { align-self: flex-start; margin: 0 0 15px 0; font-size: 28px; font-weight: bold; }

        button { width: 100%; border: none; border-radius: 4px; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        
        .btn-upload { background: #444; color: white; margin-bottom: 10px; }
        .btn-add { background: #009be2; color: white; margin-bottom: 15px; border-radius: 4px; }
        .btn-save { background: #444; color: white; margin-top: 15px; }
        .btn-done { background: #32CD32; color: black; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; padding: 25px; }

        /* Text Input Row from 542887.jpg */
        .text-entry { background: transparent; margin-bottom: 15px; position: relative; }
        .input-row { display: flex; gap: 8px; margin-bottom: 5px; }
        .input-row input[type="text"] { flex-grow: 1; padding: 12px; border-radius: 6px; border: none; font-size: 18px; }
        .btn-del { background: #ff4444; color: white; width: 50px; border-radius: 6px; font-size: 20px; }
        
        /* Inline Sliders (S, R, O) */
        .inline-sliders { display: flex; gap: 10px; align-items: center; font-size: 11px; color: #999; }
        .inline-sliders label { display: flex; align-items: center; gap: 5px; flex: 1; }
        .inline-sliders input { flex: 1; accent-color: #009be2; height: 4px; }

        /* Global Settings Grid */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #3a3a3a; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .setting-item { display: flex; flex-direction: column; gap: 8px; }
        .setting-item label { font-size: 12px; text-transform: uppercase; color: #ccc; }
        .setting-item input[type="range"] { accent-color: #009be2; }
        
        .color-box { width: 60px; height: 30px; background: black; border: 3px solid white; display: inline-block; }
        input[type="color"] { opacity: 0; width: 60px; height: 30px; cursor: pointer; position: absolute; }

        canvas { width: 100%; background: #000; margin-top: 10px; touch-action: none; border: 1px solid #444; }
        canvas.active-drag { border: 2px solid #32CD32; }

        #cropWrap { width: 100%; background: #000; display: none; margin-bottom: 10px; }
        
        @font-face {
            font-family: 'ImpactCustom';
            src: url('impact.ttf');
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>images maker</h1>
    
    <button class="btn-upload" onclick="document.getElementById('gallery').click()">UPLOAD</button>
    <input type="file" id="gallery" accept="image/*" style="display:none">

    <div id="cropWrap"><img id="cropImg" style="max-width: 100%;"></div>
    <button id="applyBtn" class="btn-add" onclick="applyCrop()" style="display:none; background:#2ecc71;">CONFIRM CROP</button>

    <div id="textInputs"></div>

    <button class="btn-add" onclick="addText()">+ ADD TEXT</button>

    <div class="settings-grid">
        <div class="setting-item">
            <label>QUALITY</label>
            <input type="range" id="quality" min="1" max="100" value="100" oninput="render()">
        </div>
        <div class="setting-item">
            <label>NOISE</label>
            <input type="range" id="noise" min="0" max="100" value="0" onchange="processBaseAndRender()">
        </div>
        <div class="setting-item">
            <label>CONTRAST</label>
            <input type="range" id="con" min="50" max="250" value="100" onchange="processBaseAndRender()">
        </div>
        <div class="setting-item">
            <label>SATURATION</label>
            <input type="range" id="sat" min="0" max="300" value="100" onchange="processBaseAndRender()">
        </div>
        <div class="setting-item">
            <label>WIDTH</label>
            <input type="range" id="wScale" min="0.1" max="3" step="0.1" value="1" oninput="updateGlobalScale()">
        </div>
        <div class="setting-item">
            <label>STROKE</label>
            <input type="range" id="s" min="0" max="20" value="5" oninput="render()">
        </div>
        <div class="setting-item">
            <label>STROKE COLOR</label>
            <div style="position:relative;">
                <div class="color-box" id="cDisp"></div>
                <input type="color" id="sCol" value="#000000" oninput="document.getElementById('cDisp').style.background=this.value; render()">
            </div>
        </div>
        <div class="setting-item">
            <label>SHADOW MODE</label>
            <input type="checkbox" id="shd" onchange="render()" style="width:25px; height:25px;">
        </div>
    </div>

    <canvas id="memeCanvas"></canvas>
    <button class="btn-save" onclick="download()">SAVE</button>
</div>

<button id="doneBtn" class="btn-done" onclick="finishMove()">✓ DONE EDITING</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('memeCanvas');
    const ctx = canvas.getContext('2d');
    const off = document.createElement('canvas'), proc = document.createElement('canvas'), textLayer = document.createElement('canvas');
    const pctx = proc.getContext('2d'), tctx = textLayer.getContext('2d');
    
    let cropper, baseImg = null, texts = [], activeDragIdx = null, holdTimer = null, isDraggingEnabled = false, dragMode = null;
    let startPointerX, startPointerY, startTextX, startTextY;

    document.fonts.load('10pt "ImpactCustom"').then(render);

    function refreshInputs() {
        const container = document.getElementById('textInputs'); container.innerHTML = '';
        texts.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'text-entry';
            div.innerHTML = `
                <div class="input-row">
                    <input type="text" value="${t.content}" oninput="texts[${i}].content=this.value; render()">
                    <button class="btn-del" onclick="removeText(${i})">X</button>
                </div>
                <div class="inline-sliders">
                    <label>S <input type="range" min="0.1" max="5" step="0.1" value="${t.size}" oninput="texts[${i}].size=parseFloat(this.value); render()"></label>
                    <label>R <input type="range" min="-180" max="180" value="${t.rot}" oninput="texts[${i}].rot=this.value; render()"></label>
                    <label>O <input type="range" min="0" max="1" step="0.1" value="${t.alpha}" oninput="texts[${i}].alpha=this.value; render()"></label>
                </div>`;
            container.appendChild(div);
        });
    }

    function addText() { 
        texts.push({ content: "Blank", x: 0.5, y: 0.5, size: 1, scaleW: 1, scaleH: 1, rot: 0, alpha: 1 }); 
        refreshInputs(); render(); 
    }
    function removeText(i) { texts.splice(i, 1); refreshInputs(); render(); }
    function updateGlobalScale() { const val = document.getElementById('wScale').value; texts.forEach(t => t.scaleW = val); render(); }

    document.getElementById('gallery').onchange = (e) => {
        const file = e.target.files[0], reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('cropWrap').style.display = 'block'; document.getElementById('applyBtn').style.display = 'block';
            const el = document.getElementById('cropImg'); el.src = ev.target.result;
            if(cropper) cropper.destroy(); cropper = new Cropper(el, { viewMode: 1 });
        };
        reader.readAsDataURL(file);
    };

    function applyCrop() {
        baseImg = new Image();
        baseImg.onload = () => {
            canvas.width = off.width = proc.width = textLayer.width = baseImg.width;
            canvas.height = off.height = proc.height = textLayer.height = baseImg.height;
            off.getContext('2d').drawImage(baseImg, 0, 0);
            document.getElementById('cropWrap').style.display = 'none'; document.getElementById('applyBtn').style.display = 'none';
            processBaseAndRender();
        };
        baseImg.src = cropper.getCroppedCanvas().toDataURL();
    }

    function processBaseAndRender() {
        if(!baseImg) return;
        pctx.clearRect(0,0,proc.width,proc.height);
        pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
        pctx.drawImage(off, 0, 0);
        const noise = document.getElementById('noise').value;
        if(noise > 0) {
            const d = pctx.getImageData(0,0,proc.width,proc.height);
            for(let i=0; i<d.data.length; i+=4) { let r = (Math.random()-0.5)*noise; d.data[i]+=r; d.data[i+1]+=r; d.data[i+2]+=r; }
            pctx.putImageData(d,0,0);
        }
        render();
    }

    function render() {
        if(!baseImg) return;
        tctx.clearRect(0,0,textLayer.width,textLayer.height);
        tctx.drawImage(proc, 0, 0);
        texts.forEach((t, i) => drawText(t, tctx, i === activeDragIdx));
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const q = document.getElementById('quality').value / 100;
        ctx.drawImage(textLayer, 0, 0, canvas.width, canvas.height);
    }

    function drawText(t, target, active) {
        const fs = (canvas.width / 10) * t.size;
        target.save();
        target.font = `${fs}px "ImpactCustom", Impact, sans-serif`;
        target.textAlign = 'center';
        target.globalAlpha = t.alpha;
        target.translate(canvas.width * t.x, canvas.height * t.y);
        target.rotate(t.rot * Math.PI / 180);
        target.scale(t.scaleW, t.scaleH);
        
        if(active) {
            target.strokeStyle = '#32CD32'; target.lineWidth = 2;
            const w = target.measureText(t.content).width + 20;
            target.strokeRect(-w/2, -fs/2, w, fs);
        }

        if(document.getElementById('shd').checked) {
            target.shadowColor = document.getElementById('sCol').value;
            target.shadowBlur = document.getElementById('s').value;
        } else {
            target.strokeStyle = document.getElementById('sCol').value;
            target.lineWidth = document.getElementById('s').value;
            target.strokeText(t.content, 0, 0);
        }
        target.fillStyle = 'white';
        target.fillText(t.content, 0, 0);
        target.restore();
    }

    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
        const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        let found = null;
        texts.forEach((t, i) => {
            const dx = Math.abs(ex - t.x * canvas.width);
            const dy = Math.abs(ey - t.y * canvas.height);
            if(dx < 100 && dy < 50) found = i;
        });

        if(found !== null) {
            startPointerX = ex; startPointerY = ey;
            startTextX = texts[found].x; startTextY = texts[found].y;
            holdTimer = setTimeout(() => {
                activeDragIdx = found; isDraggingEnabled = true; dragMode = 'move';
                canvas.classList.add('active-drag'); document.getElementById('doneBtn').style.display = 'block';
                render();
            }, 400);
        }
    });

    canvas.addEventListener('pointermove', (e) => {
        if(!isDraggingEnabled || activeDragIdx === null) return;
        const rect = canvas.getBoundingClientRect();
        const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
        const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
        texts[activeDragIdx].x = startTextX + (ex - startPointerX) / canvas.width;
        texts[activeDragIdx].y = startTextY + (ey - startPointerY) / canvas.height;
        render();
    });

    canvas.addEventListener('pointerup', () => { 
        clearTimeout(holdTimer); 
        holdTimer = null; 
        if (dragMode !== 'move') dragMode = null; 
    });

    function finishMove() {
        isDraggingEnabled = false; activeDragIdx = null; dragMode = null;
        canvas.classList.remove('active-drag'); document.getElementById('doneBtn').style.display = 'none'; render();
    }

    function download() {
        const link = document.createElement('a'); link.download = 'image.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.85); link.click();
    }
</script>
</body>
</html>
