<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meme Maker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; }
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #333; padding: 10px; border-radius: 8px; font-size: 10px; border: 1px solid #444; }
        canvas { max-width: 100%; height: auto; margin-top: 10px; background-color: #000; display: block; touch-action: none; border: 2px solid #333; border-radius: 4px; }
        canvas.active-drag { border: 2px solid #32CD32; }
        .crop-container { width: 100%; height: 40vh; background: #222; display: none; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        input[type="text"], button { padding: 12px; font-size: 14px; border: none; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-up { background: #444; color: white; width: 100%; }
        .btn-apply { background: #2ecc71; color: white; margin-top: 5px; width: 100%; }
        .btn-save { background: #f1c40f; color: black; margin-top: 10px; margin-bottom: 30px; width: 100%; font-size: 18px; }
        .btn-add { background: #3498db; color: white; width: 100%; }
        .btn-done { background: #32CD32; color: black; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; padding: 25px; font-size: 22px; border: none; letter-spacing: 2px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .text-row { display: flex; gap: 5px; width: 100%; }
        .text-row input { flex-grow: 1; background: #fff; color: #000; }
        .btn-del { background: #e74c3c; color: white; width: 45px; }
        .sub-settings { display: flex; gap: 10px; font-size: 9px; align-items: center; margin-bottom: 5px; background: #222; padding: 5px; border-radius: 4px; }
        .sub-settings input { height: 4px; flex-grow: 1; accent-color: #3498db; }
        label { display: flex; flex-direction: column; gap: 2px; text-transform: uppercase; color: #bbb; }
        @font-face { font-family: 'MemeImpact'; src: url('impact.ttf'); font-weight: normal; font-style: normal; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:5px 0; text-align: center; letter-spacing: 1px;">IMAGE MAKER</h2>
        <button class="btn-up" onclick="document.getElementById('gallery').click()">1. Upload Image</button>
        <input type="file" id="gallery" accept="image/*" style="display:none">
        <div id="cropWrap" class="crop-container"><img id="cropImg" style="display: block; max-width: 100%;"></div>
        <button id="applyBtn" class="btn-apply" onclick="applyCrop()" style="display:none">Confirm Crop</button>
        <div id="textInputs" style="display: flex; flex-direction: column; gap: 8px; margin: 10px 0;"></div>
        <button class="btn-add" onclick="addText()">+ Add New Text</button>
        <div class="settings">
            <label>Quality <input type="range" id="quality" min="1" max="100" value="100" oninput="render()"></label>
            <label>Noise <input type="range" id="noise" min="0" max="100" value="0" onchange="processBaseAndRender()"></label>
            <label>Contrast <input type="range" id="con" min="50" max="250" value="100" onchange="processBaseAndRender()"></label>
            <label>Saturation <input type="range" id="sat" min="0" max="300" value="100" onchange="processBaseAndRender()"></label>
            <label>Stroke Size <input type="range" id="s" min="0" max="20" value="5" oninput="render()"></label>
            <label>Stroke Color <input type="color" id="sCol" value="#000000" oninput="render()"></label>
            <label style="flex-direction: row; align-items: center; justify-content: space-between; grid-column: span 2;">
                Shadow Mode <input type="checkbox" id="shd" onchange="render()" style="width: 20px; height: 20px;">
            </label>
        </div>
    </div>

    <canvas id="memeCanvas"></canvas>
    <button id="doneBtn" class="btn-done" onclick="finishMove()">✓ DONE EDITING</button>

    <div class="controls">
        <button class="btn-save" onclick="download()">SAVE IMAGE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const off = document.createElement('canvas'), proc = document.createElement('canvas'), textLayer = document.createElement('canvas');
        const pctx = proc.getContext('2d'), tctx = textLayer.getContext('2d');
        
        let cropper, baseImg = null, texts = [], activeDragIdx = null, holdTimer = null, isDraggingEnabled = false, dragMode = null;
        let startPointerX = 0, startPointerY = 0, startTextX = 0, startTextY = 0, startScaleW = 1, startScaleH = 1, startHandleDist = 0;

        document.fonts.load('10pt "MemeImpact"').then(() => { render(); });

        function refreshInputs() {
            const container = document.getElementById('textInputs'); container.innerHTML = '';
            texts.forEach((t, i) => {
                const div = document.createElement('div');
                div.style.background = "#444"; div.style.padding = "10px"; div.style.borderRadius = "8px";
                div.innerHTML = `<div class="text-row">
                    <input type="text" placeholder="Type text..." value="${t.content}" oninput="texts[${i}].content=this.value; render()">
                    <button class="btn-del" onclick="removeText(${i})">✕</button>
                </div>
                <div class="sub-settings">
                    Size<input type="range" min="0.1" max="5" step="0.1" value="${t.size}" oninput="texts[${i}].size=parseFloat(this.value); render()">
                    Rot<input type="range" min="-180" max="180" value="${t.rot}" oninput="texts[${i}].rot=this.value; render()">
                    Opac<input type="range" min="0" max="1" step="0.1" value="${t.alpha}" oninput="texts[${i}].alpha=this.value; render()">
                </div>`;
                container.appendChild(div);
            });
        }

        function addText() { 
            texts.push({ content: "NEW TEXT", x: 0.5, y: 0.5, size: 1, scaleW: 1, scaleH: 1, rot: 0, alpha: 1, width: 0, height: 0, baseW: 100, baseH: 50 }); 
            refreshInputs(); render(); 
        }
        
        function removeText(i) { texts.splice(i, 1); refreshInputs(); render(); }

        document.getElementById('gallery').onchange = (e) => {
            const file = e.target.files[0], reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropWrap').style.display = 'block'; document.getElementById('applyBtn').style.display = 'block';
                const el = document.getElementById('cropImg'); el.src = ev.target.result;
                if(cropper) cropper.destroy(); cropper = new Cropper(el, { viewMode: 1, autoCropArea: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            baseImg = new Image();
            baseImg.onload = () => {
                canvas.width = off.width = proc.width = textLayer.width = baseImg.width;
                canvas.height = off.height = proc.height = textLayer.height = baseImg.height;
                off.getContext('2d').drawImage(baseImg, 0, 0);
                document.getElementById('cropWrap').style.display = 'none'; document.getElementById('applyBtn').style.display = 'none';
                processBaseAndRender();
            };
            baseImg.src = cropper.getCroppedCanvas().toDataURL();
        }

        function processBaseAndRender() {
            if(!baseImg) return;
            pctx.clearRect(0,0,proc.width,proc.height);
            pctx.filter = `contrast(${document.getElementById('con').value}%) saturate(${document.getElementById('sat').value}%)`;
            pctx.drawImage(off, 0, 0); pctx.filter = 'none';
            const noise = document.getElementById('noise').value;
            if(noise > 0) {
                const d = pctx.getImageData(0,0,proc.width,proc.height);
                for(let i=0; i<d.data.length; i+=4) { let r = (Math.random()-0.5) * noise; d.data[i]+=r; d.data[i+1]+=r; d.data[i+2]+=r; }
                pctx.putImageData(d,0,0);
            }
            render();
        }

        function render() {
            if(!baseImg) return;
            const qVal = document.getElementById('quality').value;
            tctx.clearRect(0,0,textLayer.width,textLayer.height);
            tctx.drawImage(proc, 0, 0);
            texts.forEach((t, i) => drawText(t, tctx, i === activeDragIdx));
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(qVal < 100) {
                let s = Math.pow(qVal / 100, 3); if (s < 0.005) s = 0.005;
                let tw = Math.max(1, canvas.width * s), th = Math.max(1, canvas.height * s);
                let temp = document.createElement('canvas'); temp.width = tw; temp.height = th;
                temp.getContext('2d').drawImage(textLayer, 0, 0, textLayer.width, textLayer.height, 0, 0, tw, th);
                ctx.imageSmoothingEnabled = false; ctx.drawImage(temp, 0, 0, tw, th, 0, 0, canvas.width, canvas.height);
            } else { ctx.drawImage(textLayer, 0, 0); }
        }

        function drawText(textObj, targetCtx, isActive) {
            if(!textObj.content && !isActive) return;
            const content = textObj.content || "HOLDING";
            const lines = content.split('\\n');
            let fs = (canvas.width / 9) * textObj.size;
            targetCtx.save();
            targetCtx.font = `bold ${fs}px "MemeImpact", Impact, sans-serif`;
            let maxLineW = 0;
            lines.forEach(l => {
                let m = targetCtx.measureText(l.toUpperCase()).width;
                if(m > maxLineW) maxLineW = m;
            });
            textObj.baseW = maxLineW; textObj.baseH = fs * lines.length;
            textObj.width = textObj.baseW * textObj.scaleW; textObj.height = textObj.baseH * textObj.scaleH;
            targetCtx.globalAlpha = textObj.alpha;
            targetCtx.translate(canvas.width * textObj.x, canvas.height * textObj.y);
            targetCtx.rotate(textObj.rot * Math.PI / 180);
            if (isActive) {
                targetCtx.strokeStyle = '#32CD32'; targetCtx.lineWidth = 4;
                targetCtx.strokeRect(-textObj.width/2 - 15, -textObj.height/1.3, textObj.width + 30, textObj.height + 30);
                targetCtx.fillStyle = '#e74c3c'; targetCtx.fillRect(textObj.width/2 + 10, -textObj.height/1.3 - 40, 50, 50);
                targetCtx.fillStyle = '#3498db'; targetCtx.fillRect(textObj.width/2 + 15, -25, 40, 40);
                targetCtx.fillStyle = '#2ecc71'; targetCtx.fillRect(-20, textObj.height/2 + 15, 40, 40);
            }
            lines.forEach((line, i) => {
                targetCtx.save();
                targetCtx.translate(0, i * fs * 0.9);
                targetCtx.scale(textObj.scaleW, textObj.scaleH);
                targetCtx.textAlign = 'center';
                if(document.getElementById('shd').checked) { 
                    targetCtx.shadowColor = document.getElementById('sCol').value; targetCtx.shadowBlur = document.getElementById('s').value * 2;
                } else {
                    targetCtx.strokeStyle = document.getElementById('sCol').value; 
                    targetCtx.lineWidth = document.getElementById('s').value * (canvas.width/800);
                    targetCtx.strokeText(line.toUpperCase(), 0, 0);
                }
                targetCtx.fillStyle = 'white'; targetCtx.fillText(line.toUpperCase(), 0, 0);
                targetCtx.restore();
            });
            targetCtx.restore();
        }

        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
            const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
            if (isDraggingEnabled && activeDragIdx !== null) {
                const t = texts[activeDragIdx];
                const cx = t.x * canvas.width, cy = t.y * canvas.height;
                const angle = -t.rot * Math.PI / 180;
                const lx = (ex - cx) * Math.cos(angle) - (ey - cy) * Math.sin(angle);
                const ly = (ex - cx) * Math.sin(angle) + (ey - cy) * Math.cos(angle);
                if (lx > t.width/2 && lx < t.width/2 + 100 && ly < -t.height/1.5 && ly > -t.height/1.5 - 100) {
                    dragMode = 'size'; startScaleW = t.scaleW; startHandleDist = Math.sqrt(lx*lx + ly*ly);
                    canvas.setPointerCapture(e.pointerId); return;
                }
                if (lx > t.width/2 + 5 && lx < t.width/2 + 110 && ly > -60 && ly < 60) {
                    dragMode = 'width'; startScaleW = t.scaleW; startHandleDist = lx;
                    canvas.setPointerCapture(e.pointerId); return;
                }
                if (lx > -60 && lx < 60 && ly > t.height/2 + 5 && ly < t.height/2 + 110) {
                    dragMode = 'height'; startScaleH = t.scaleH; startHandleDist = ly;
                    canvas.setPointerCapture(e.pointerId); return;
                }
            }
            let foundIdx = null;
            for(let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                const cx = t.x * canvas.width, cy = t.y * canvas.height;
                const angle = -t.rot * Math.PI / 180;
                const lx = (ex - cx) * Math.cos(angle) - (ey - cy) * Math.sin(angle);
                const ly = (ex - cx) * Math.sin(angle) + (ey - cy) * Math.cos(angle);
                if (Math.abs(lx) < t.width/2 + 50 && Math.abs(ly) < t.height/2 + 50) { foundIdx = i; break; }
            }
            if (foundIdx !== null) {
                startPointerX = ex; startPointerY = ey;
                startTextX = texts[foundIdx].x; startTextY = texts[foundIdx].y;
                holdTimer = setTimeout(() => {
                    activeDragIdx = foundIdx; isDraggingEnabled = true; dragMode = 'move';
                    canvas.classList.add('active-drag'); document.getElementById('doneBtn').style.display = 'block';
                    canvas.setPointerCapture(e.pointerId); render();
                }, 400);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const ex = (e.clientX - rect.left) * (canvas.width / rect.width);
            const ey = (e.clientY - rect.top) * (canvas.height / rect.height);
            if (holdTimer && (Math.abs(ex - startPointerX) > 15 || Math.abs(ey - startPointerY) > 15)) {
                clearTimeout(holdTimer); holdTimer = null;
            }
            if (!isDraggingEnabled || activeDragIdx === null || !canvas.hasPointerCapture(e.pointerId)) return;
            const t = texts[activeDragIdx];
            if (dragMode === 'move') {
                t.x = startTextX + (ex - startPointerX) / canvas.width;
                t.y = startTextY + (ey - startPointerY) / canvas.height;
            } else {
                const cx = t.x * canvas.width, cy = t.y * canvas.height;
                const angle = -t.rot * Math.PI / 180;
                const lx = (ex - cx) * Math.cos(angle) - (ey - cy) * Math.sin(angle);
                const ly = (ex - cx) * Math.sin(angle) + (ey - cy) * Math.cos(angle);
                if (dragMode === 'size') {
                    const currentDist = Math.sqrt(lx*lx + ly*ly);
                    const ratio = currentDist / startHandleDist;
                    t.scaleW *= ratio; t.scaleH *= ratio;
                    startHandleDist = currentDist;
                } else if (dragMode === 'width') {
                    t.scaleW = Math.max(0.1, startScaleW * (lx / startHandleDist));
                } else if (dragMode === 'height') {
                    t.scaleH = Math.max(0.1, startScaleH * (ly / startHandleDist));
                }
            }
            render();
        });

        canvas.addEventListener('pointerup', () => { clearTimeout(holdTimer); holdTimer = null; if (dragMode !== 'move') dragMode = null; });

        function finishMove() {
            isDraggingEnabled = false; activeDragIdx = null; dragMode = null;
            canvas.classList.remove('active-drag'); document.getElementById('doneBtn').style.display = 'none'; render();
        }

        function download() {
            const link = document.createElement('a'); link.download = 'meme.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.85); link.click();
        }
    </script>
</body>
</html>
