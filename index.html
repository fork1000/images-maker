<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'TrueImpact';
            src: url('https://cdn.jsdelivr.net/gh/rockthepiano/impact-font@master/impact.woff') format('woff');
        }
        body { 
            background-color: #333333; 
            color: white; 
            font-family: sans-serif;
            padding: 20px;
        }
        canvas { 
            max-width: 100%; 
            display: block; 
            margin-top: 10px; 
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>images maker</h1>

    <button onclick="document.getElementById('gallery').click()">upload</button>
    <input type="file" id="gallery" accept="image/*" style="display:none">
    
    <input type="text" id="topText" placeholder="Top Text" oninput="draw()">
    <input type="text" id="bottomText" placeholder="Bottom Text" oninput="draw()">
    
    <label>quality:</label>
    <input type="range" id="quality" min="0.01" max="1.0" step="0.01" value="1.0" oninput="draw()">
    
    <button onclick="download()">save</button>

    <br>
    <canvas id="memeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const offscreen = document.createElement('canvas');
        const octx = offscreen.getContext('2d');
        let img = null;

        const cfg = {
            w: 0.93,
            s: 5,
            h: 0.9,
            sp: 0,
            r: 'miter'
        };

        const impact = new FontFace('TrueImpact', 'url(https://cdn.jsdelivr.net/gh/rockthepiano/impact-font@master/impact.woff)');
        impact.load().then((f) => {
            document.fonts.add(f);
            draw();
        });

        document.getElementById('gallery').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                img = new Image();
                img.onload = () => {
                    canvas.width = offscreen.width = img.width;
                    canvas.height = offscreen.height = img.height;
                    draw();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function draw() {
            if(!img) return;

            octx.clearRect(0, 0, offscreen.width, offscreen.height);
            octx.drawImage(img, 0, 0);

            const fontSize = offscreen.width / 9;
            octx.font = `${fontSize}px TrueImpact`;
            octx.textAlign = 'center';
            octx.fillStyle = 'white';
            octx.strokeStyle = 'black';
            
            octx.lineWidth = cfg.s * (offscreen.width / 1000);
            octx.lineJoin = cfg.r;
            octx.miterLimit = 2;
            octx.letterSpacing = `${cfg.sp}px`;

            const t = document.getElementById('topText').value.toUpperCase();
            const b = document.getElementById('bottomText').value.toUpperCase();

            octx.save();
            octx.translate(offscreen.width / 2, fontSize + 10);
            octx.scale(cfg.w, cfg.h); 
            octx.strokeText(t, 0, 0);
            octx.fillText(t, 0, 0);
            octx.restore();

            octx.save();
            octx.translate(offscreen.width / 2, offscreen.height - 30);
            octx.scale(cfg.w, cfg.h);
            octx.strokeText(b, 0, 0);
            octx.fillText(b, 0, 0);
            octx.restore();

            const q = parseFloat(document.getElementById('quality').value);
            const dataUrl = offscreen.toDataURL('image/jpeg', q);
            const tempImg = new Image();
            tempImg.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(tempImg, 0, 0);
            };
            tempImg.src = dataUrl;
        }

        function download() {
            const q = parseFloat(document.getElementById('quality').value);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let name = '';
            for (let i = 0; i < 12; i++) {
                name += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            const link = document.createElement('a');
            link.download = name + '.jpg';
            link.href = offscreen.toDataURL('image/jpeg', q);
            link.click();
        }
    </script>
</body>
</html>
